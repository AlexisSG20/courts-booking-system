name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Build API
        working-directory: courts-api
        run: npm run build

      - name: Build Web
        working-directory: courts-web
        run: npm run build