name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            courts-api/package-lock.json
            courts-web/package-lock.json

      - name: Install API
        working-directory: courts-api
        run: npm ci

      - name: Build API
        working-directory: courts-api
        run: npm run build

      - name: Install Web
        working-directory: courts-web
        run: npm ci

      - name: Build Web
        working-directory: courts-web
        run: npm run build